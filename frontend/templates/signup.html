<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StockLens</title>
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        
        <a href="/" class="back-link">
            <span>&larr;</span> Back to Home
        </a>

        <a href="/" class="auth-brand">
            <span class="logo-icon">📈</span>
            <span class="brand-name">StockLens</span>
        </a>

        <div class="card auth-card">
            <div class="auth-header">
                <h2>Create your account</h2>
                <p>Join thousands of traders analyzing the market smarter.</p>
            </div>

            <form action="/dashboard" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="full_name" class="form-label">Full Name</label>
                    <input type="text" id="firstName" name="firstName" class="form-control" placeholder="Jane Doe" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="At least 8 characters" required minlength="8">
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required class="form-checkbox">
                    <label for="terms" class="checkbox-label">
                        I agree to the <a href="/terms" class="text-accent">Terms of Service</a> and <a href="/privacy" class="text-accent">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login" class="text-accent">Log in</a></p>
            </div>
        </div>
    </div>

</body>
</html>
